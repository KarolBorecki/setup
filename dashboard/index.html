<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23121109'/><circle cx='50' cy='50' r='24' fill='none' stroke='%23c8973a' stroke-width='8'/><circle cx='50' cy='50' r='8' fill='%23c8973a'/></svg>"
        />
        <style>
            :root {
                --bg: #0c0b09;
                --bg2: #121109;
                --bg3: #181610;
                --border: rgba(200, 170, 90, 0.12);
                --border2: rgba(200, 170, 90, 0.22);
                --gold: #c8973a;
                --gold-dim: #8a6420;
                --cream: #ece8de;
                --muted: #7a7060;
                --muted2: #504840;
                --green: #4caf78;
                --mono: "Montserrat", monospace;
                --serif: "Montserrat", serif;
                --sans: "Montserrat", sans-serif;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
                width: 100%;
                overflow: hidden;
                background: var(--bg);
                color: var(--cream);
                font-family: var(--sans);
            }

            /* Subtle grain overlay */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 1;
                opacity: 0.4;
            }

            /* Ambient warm glow */
            body::after {
                content: "";
                position: fixed;
                width: 600px;
                height: 600px;
                top: -200px;
                left: 50%;
                transform: translateX(-50%);
                background: radial-gradient(
                    circle,
                    rgba(200, 150, 58, 0.06) 0%,
                    transparent 70%
                );
                pointer-events: none;
                z-index: 0;
            }

            .layout {
                position: relative;
                z-index: 2;
                display: grid;
                grid-template-rows: 1fr auto;
                height: 100vh;
                padding: 20px 24px 16px;
                gap: 16px;
            }

            .grid {
                display: grid;
                grid-template-columns: 280px 1fr 1.4fr;
                gap: 16px;
                min-height: 0;
            }

            .col {
                display: flex;
                flex-direction: column;
                gap: 14px;
                min-height: 0;
            }

            /* ── Card ── */
            .card {
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 18px 20px;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
                position: relative;
                overflow: hidden;
                animation: fadeUp 0.5s ease both;
            }

            .card::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 14px;
                background: linear-gradient(
                    135deg,
                    rgba(200, 150, 58, 0.04) 0%,
                    transparent 60%
                );
                pointer-events: none;
            }

            .card.expand {
                flex: 1;
                min-height: 0;
            }

            .card-label {
                font-family: var(--mono);
                font-size: 10px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--gold-dim);
                margin-bottom: 14px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .card-label::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }

            .scrollable {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding-right: 4px;
            }

            .scrollable::-webkit-scrollbar {
                width: 2px;
            }
            .scrollable::-webkit-scrollbar-track {
                background: transparent;
            }
            .scrollable::-webkit-scrollbar-thumb {
                background: var(--muted2);
                border-radius: 2px;
            }

            /* ── Clock ── */
            .clock-card {
                text-align: center;
                padding: 22px 20px 18px;
                flex-shrink: 0;
            }

            .clock {
                font-family: var(--serif);
                font-size: 76px;
                font-weight: 700;
                line-height: 1;
                color: var(--cream);
                letter-spacing: -2px;
                margin-bottom: 6px;
                text-shadow: 0 0 60px rgba(200, 150, 58, 0.15);
            }

            .date-line {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--muted);
                letter-spacing: 0.08em;
                margin-bottom: 12px;
            }

            .weather-pill {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: rgba(200, 150, 58, 0.08);
                border: 1px solid var(--border2);
                border-radius: 20px;
                padding: 6px 16px;
                font-family: var(--sans);
                font-size: 13px;
                font-weight: 500;
                color: var(--gold);
                transition: all 0.4s ease;
            }

            /* ── Pomodoro ── */
            .pomodoro-card {
                align-items: center;
                gap: 0;
            }

            .ring-wrap {
                position: relative;
                width: 140px;
                height: 140px;
                margin: 8px auto 16px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .progress-ring {
                position: absolute;
                inset: 0;
                transform: rotate(-90deg);
            }
            .ring-bg {
                stroke: var(--bg2);
            }
            .ring-fg {
                stroke: var(--gold);
                stroke-linecap: round;
                transition: stroke-dashoffset 1s linear;
                filter: drop-shadow(0 0 6px rgba(200, 150, 58, 0.5));
            }

            .timer-num {
                font-family: var(--serif);
                font-size: 32px;
                font-weight: 500;
                color: var(--cream);
                position: absolute;
            }

            .pom-btns {
                display: flex;
                gap: 10px;
                width: 100%;
            }

            .btn {
                flex: 1;
                padding: 9px 14px;
                border-radius: 8px;
                border: 1px solid var(--border2);
                background: rgba(200, 150, 58, 0.06);
                color: var(--cream);
                font-family: var(--sans);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .btn:hover {
                background: rgba(200, 150, 58, 0.14);
                border-color: var(--gold);
                color: var(--gold);
            }

            .btn.primary {
                background: rgba(200, 150, 58, 0.15);
                border-color: var(--border2);
            }

            /* ── Habits ── */
            .habit-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid transparent;
                cursor: pointer;
                transition: all 0.2s ease;
                margin-bottom: 6px;
                font-size: 13px;
                font-weight: 400;
                color: #b8b0a0;
            }

            .habit-item:hover {
                background: rgba(200, 150, 58, 0.06);
                border-color: var(--border);
            }
            .habit-item input[type="checkbox"] {
                display: none;
            }

            .habit-box {
                width: 16px;
                height: 16px;
                border: 1.5px solid var(--muted2);
                border-radius: 4px;
                flex-shrink: 0;
                transition: all 0.2s ease;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .habit-item.checked .habit-box {
                background: var(--gold);
                border-color: var(--gold);
            }

            .habit-item.checked .habit-box::after {
                content: "✓";
                font-size: 10px;
                color: #0c0b09;
                font-weight: 700;
            }

            .habit-item.checked span {
                text-decoration: line-through;
                color: var(--muted);
            }

            /* ── Calendar events ── */
            /* Base Event Structure */
            :root {
                --hour-height: 80px; /* How tall one hour is */
            }

            .calendar-wrapper {
                position: relative;
                background: #1a1a1a;
                border-radius: 8px;
                overflow-y: auto;
                height: 100%;
            }

            /* The horizontal hour lines */
            .time-grid {
                position: relative;
                width: 100%;
            }

            .hour-row {
                height: var(--hour-height);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                display: flex;
                align-items: flex-start;
            }

            .hour-label {
                width: 60px;
                font-size: 10px;
                color: var(--muted);
                text-align: right;
                padding-right: 10px;
                margin-top: -6px;
                font-family: var(--mono);
            }

            /* The container for events */
            .events-layer {
                position: absolute;
                top: 0;
                left: 60px; /* Offset for hour labels */
                right: 10px;
                height: 100%;
                pointer-events: none;
            }

            /* Individual Event Styling */
            .cal-event-apple {
                position: absolute;
                pointer-events: auto;
                border-left: 3px solid var(--gold);
                background: rgba(200, 150, 58, 0.15);
                border-radius: 4px;
                padding: 6px 10px;
                font-family: var(--sans);
                overflow: hidden;
                transition: transform 0.1s;
            }

            .cal-event-apple:hover {
                filter: brightness(1.2);
            }

            .apple-title {
                font-size: 12px;
                font-weight: 600;
                color: #fff;
                margin-bottom: 2px;
            }

            .apple-subtitle {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.6);
            }

            /* Current Time Indicator */
            .now-indicator-line {
                position: absolute;
                left: 0;
                right: 0;
                height: 2px;
                background: #ff3b30;
                z-index: 10;
            }

            .now-indicator-line::before {
                content: "";
                position: absolute;
                left: 55px;
                top: -4px;
                width: 10px;
                height: 10px;
                background: #ff3b30;
                border-radius: 50%;
            }

            /* Colors matching your classes */
            .cal-event-apple.green {
                border-left-color: #34c759;
                background: rgba(52, 199, 89, 0.1);
            }
            .cal-event-apple.orange {
                border-left-color: #ff9500;
                background: rgba(255, 149, 0, 0.1);
            }
            .cal-event-apple.dark-blue {
                border-left-color: #0a4982;
                background: rgba(10, 73, 130, 0.1);
            }

            /* ── Spotify Layout ── */
            .spotify-layout {
                display: flex;
                flex-direction: row;
                gap: 20px;
                align-items: stretch; /* Forces children to match height */
                width: 100%;
            }

            .spotify-now-playing {
                display: flex;
                flex-direction: row; /* Side-by-side: Art | Details */
                gap: 20px;
                flex: 2;
                min-width: 0;
            }

            /* Full Height Cover */
            .spotify-cover {
                height: 140px; /* Adjust this value to set the overall card height */
                width: 140px;
                border-radius: 12px;
                object-fit: cover;
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
                border: 1px solid var(--border);
                flex-shrink: 0;
            }

            /* Vertical stack for info and controls */
            .spotify-details {
                display: flex;
                flex-direction: column;
                justify-content: center; /* Centers the whole stack vertically */
                gap: 14px;
                flex: 1;
                min-width: 0;
            }

            .spotify-info {
                text-align: left;
                width: 100%;
                overflow: hidden;
            }

            .spotify-track {
                font-family: var(--sans);
                font-size: 16px;
                font-weight: 600;
                color: var(--cream);
                margin-bottom: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .spotify-artist {
                font-family: var(--sans);
                font-size: 13px;
                color: var(--muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .spotify-controls {
                display: flex;
                gap: 8px;
                justify-content: flex-start;
            }

            .icon-btn {
                padding: 8px 14px;
                font-size: 12px;
            }

            .icon-btn {
                padding: 8px 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
            }

            /* ── Spotify Queue ── */
            /* ── Spotify Queue Styling ── */
            .spotify-queue {
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow-y: auto;
                padding-right: 4px;
            }

            .queue-item {
                display: flex;
                flex-direction: row; /* Align thumb and text side-by-side */
                align-items: center;
                gap: 12px;
                background: rgba(150, 150, 150, 0.04);
                padding: 6px;
                border-radius: 8px;
                border: 1px solid transparent;
                transition: all 0.2s ease;
            }

            .queue-item:hover {
                background: rgba(150, 150, 150, 0.08);
                border-color: var(--border);
            }

            .queue-thumb {
                width: 36px;
                height: 36px;
                border-radius: 4px;
                object-fit: cover;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            .queue-details {
                flex: 1;
                min-width: 0; /* Ensures text truncation works */
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .queue-track {
                font-size: 12px;
                font-weight: 500;
                color: var(--cream);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 1px;
            }

            .queue-artist {
                font-size: 11px;
                color: var(--muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* Modifies your existing .btn class specifically for icons */
            .icon-btn {
                padding: 10px 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
            }

            /* ── News ── */
            .news-item {
                padding-bottom: 10px;
                margin-bottom: 10px;
                border-bottom: 1px solid var(--border);
            }

            .news-item:last-child {
                border-bottom: none;
                padding-bottom: 0;
                margin-bottom: 0;
            }

            .news-item a {
                font-size: 13px;
                color: #b8b0a0;
                text-decoration: none;
                line-height: 1.45;
                display: block;
                transition: color 0.2s;
            }

            .news-item a:hover {
                color: var(--gold);
            }

            /* ── Spotify ── */
            .spotify-card iframe {
                border-radius: 10px;
                display: block;
            }

            /* ── Bookmarks ── */
            .bookmarks {
                display: flex;
                gap: 12px;
                justify-content: center;
                flex-wrap: wrap;
                padding: 14px 20px;
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 14px;
                flex-shrink: 0;
                position: relative;
                z-index: 2;
            }

            .bm {
                width: 44px;
                height: 44px;
                border-radius: 12px;
                background: rgba(150, 150, 150, 0.04);
                border: 1px solid transparent;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--muted);
                transition: all 0.2s ease;
                text-decoration: none;
            }

            .bm svg {
                width: 20px;
                height: 20px;
                stroke-width: 1.5px;
            }

            .bm:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
                background: rgba(200, 150, 58, 0.12); /* Soft gold tint */
                border-color: var(--border2);
                color: var(--gold); /* Icon turns gold on hover */
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .card:nth-child(1) {
                animation-delay: 0.05s;
            }
            .card:nth-child(2) {
                animation-delay: 0.1s;
            }
            .card:nth-child(3) {
                animation-delay: 0.15s;
            }

            .col:nth-child(2) .card:nth-child(1) {
                animation-delay: 0.12s;
            }
            .col:nth-child(2) .card:nth-child(2) {
                animation-delay: 0.18s;
            }
            .col:nth-child(3) .card:nth-child(1) {
                animation-delay: 0.18s;
            }
            .col:nth-child(3) .card:nth-child(2) {
                animation-delay: 0.23s;
            }
            .col:nth-child(3) .card:nth-child(3) {
                animation-delay: 0.28s;
            }

            .placeholder {
                color: var(--muted);
                font-size: 12px;
                font-family: var(--mono);
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <div class="grid">
                <!-- COL 1 -->
                <div class="col">
                    <div class="card clock-card">
                        <div class="clock" id="clock">00:00</div>
                        <div class="date-line" id="dateline">
                            Monday, April 06
                        </div>
                        <div class="weather-pill">
                            <span>&#9675;</span>
                            <span id="temp">--</span>°C &nbsp;·&nbsp;
                            <span id="condition">Loading</span>
                        </div>
                    </div>

                    <div class="card pomodoro-card">
                        <div class="card-label">Focus Timer</div>
                        <div class="ring-wrap">
                            <svg
                                class="progress-ring"
                                viewBox="0 0 140 140"
                                width="140"
                                height="140"
                            >
                                <circle
                                    class="ring-bg"
                                    stroke-width="6"
                                    fill="none"
                                    r="62"
                                    cx="70"
                                    cy="70"
                                />
                                <circle
                                    class="ring-fg"
                                    stroke-width="6"
                                    fill="none"
                                    r="62"
                                    cx="70"
                                    cy="70"
                                    id="ring"
                                />
                            </svg>
                            <div class="timer-num" id="pomodoro-time">
                                25:00
                            </div>
                        </div>
                        <div class="pom-btns">
                            <button
                                class="btn primary"
                                onclick="toggleTimer()"
                                id="timer-btn"
                            >
                                Start Focus
                            </button>
                            <button class="btn" onclick="resetTimer()">
                                Reset
                            </button>
                        </div>
                    </div>

                    <div class="card expand">
                        <div class="card-label">Reminder</div>
                        <div class="scrollable" id="habit-list"></div>
                    </div>
                </div>

                <div class="col">
                    <div class="card expand">
                        <div class="card-label">Day View</div>
                        <div
                            class="calendar-wrapper"
                            id="calendar-container"
                        ></div>
                    </div>

                    <div class="card spotify-card">
                        <div class="card-label">Spotify</div>
                        <div id="spotify-container" class="spotify-layout">
                            <div class="spotify-now-playing">
                                <img
                                    id="album-art"
                                    class="spotify-cover"
                                    src=""
                                    alt="Album Art"
                                    style="display: none"
                                />

                                <div class="spotify-details">
                                    <div class="spotify-info">
                                        <div
                                            id="track-name"
                                            class="spotify-track"
                                        >
                                            Not Playing
                                        </div>
                                        <div
                                            id="artist-name"
                                            class="spotify-artist"
                                        >
                                            -
                                        </div>
                                    </div>

                                    <div class="spotify-controls">
                                        <button
                                            class="btn icon-btn"
                                            onclick="controlSpotify('previous')"
                                        >
                                            ⏮
                                        </button>
                                        <button
                                            class="btn icon-btn primary"
                                            id="play-pause-btn"
                                            onclick="
                                                controlSpotify('play/pause')
                                            "
                                        >
                                            ⏯
                                        </button>
                                        <button
                                            class="btn icon-btn"
                                            onclick="controlSpotify('next')"
                                        >
                                            ⏭
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="spotify-queue-container">
                                <div class="queue-label">Next in Queue</div>
                                <div id="spotify-queue" class="spotify-queue">
                                    <div class="queue-item placeholder">
                                        Loading queue...
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- COL 3 -->
                <div class="col">
                    <div class="card expand">
                        <div class="card-label">World News</div>
                        <ul
                            class="scrollable"
                            id="world-list"
                            style="list-style: none"
                        >
                            <div class="placeholder">Fetching headlines…</div>
                        </ul>
                    </div>

                    <div class="card expand">
                        <div class="card-label">Programming News</div>
                        <ul
                            class="scrollable"
                            id="hn-list"
                            style="list-style: none"
                        >
                            <div class="placeholder">Loading top stories…</div>
                        </ul>
                    </div>

                    <div class="card expand">
                        <div class="card-label">Space News</div>
                        <ul
                            class="scrollable"
                            id="space-list"
                            style="list-style: none"
                        >
                            <div class="placeholder">Loading launches…</div>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Bookmarks -->
            <div class="bookmarks">
                <a
                    href="https://www.icloud.com/calendar/"
                    class="bm"
                    title="Calendar"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <rect
                            x="3"
                            y="4"
                            width="18"
                            height="18"
                            rx="2"
                            ry="2"
                        ></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>

        <script>
            // ── Clock & Date ──────────────────────────────────────────────
            const DAYS = [
                "Sunday",
                "Monday",
                "Tuesday",
                "Wednesday",
                "Thursday",
                "Friday",
                "Saturday",
            ];
            const MONTHS = [
                "January",
                "February",
                "March",
                "April",
                "May",
                "June",
                "July",
                "August",
                "September",
                "October",
                "November",

            ];

            function updateClock() {
                const now = new Date();
                document.getElementById("clock").textContent =
                    String(now.getHours()).padStart(2, "0") +
                    ":" +
                    String(now.getMinutes()).padStart(2, "0");
                document.getElementById("dateline").textContent =
                    DAYS[now.getDay()] +
                    ", " +
                    MONTHS[now.getMonth()] +
                    " " +
                    String(now.getDate()).padStart(2, "0");
            }
            setInterval(updateClock, 1000);
            updateClock();

            const calendars = [
                {
                    name: "Private",
                    url: "https://p168-caldav.icloud.com/published/2/MTAwMDIxNTEzMTIxMDAwMnULAWWeM4R3QYo4reFBVkCmlvqcwqHmGXEHMfBOpcr7d0-ONDtxECNPWMfN7pvS_C0_OqpJwPNL0b4C8SRPGmY",
                    colorClass: "",
                },
                {
                    name: "Exams",
                    url: "https://p168-caldav.icloud.com/published/2/MTAwMDIxNTEzMTIxMDAwMnULAWWeM4R3QYo4reFBVkAOEMf7v8Z8Hkcnjo0oOQyeqn_UGv3TLQlhEr5mN7xLG5okW3cF4_CvGfCHYVvvdBA",

                },
                {

                    url: "https://p168-caldav.icloud.com/published/2/MTAwMDIxNTEzMTIxMDAwMnULAWWeM4R3QYo4reFBVkCfwdbdu3LI7iiPjmFpKAdwbPJ8Su9o-lw-PNGenqJMIDAY_DkYX7wUZczyAbkK9G8",
                    colorClass: "dim",
                },
                {
                    name: "School",
                    url: "https://p168-caldav.icloud.com/published/2/MTAwMDIxNTEzMTIxMDAwMnULAWWeM4R3QYo4reFBVkC0WuIMLarWx6-sl4FVEhVW0cJwAdPUB0hOujpXACsaAgMbguioo9ic4d5-jUts5MM",
                    colorClass: "dim",
                },
                {
                    name: "Work",
                    url: "https://p168-caldav.icloud.com/published/2/MTAwMDIxNTEzMTIxMDAwMnULAWWeM4R3QYo4reFBVkCfwdbdu3LI7iiPjmFpKAdwbPJ8Su9o-lw-PNGenqJMIDAY_DkYX7wUZczyAbkK9G8",
                    colorClass: "dim",
                },
            ];

            async function fetchAppleCalendars() {
                let failedCalendars = [];
                const fetchPromises = calendars.map(async (calendar) => {
                    try {
                        const proxyUrl =
                            "https://corsproxy.io/?" +
                            encodeURIComponent(calendar.url);
                        const response = await fetch(proxyUrl);
                        if (!response.ok) throw new Error();
                        const icsData = await response.text();
                        return parseICS(icsData, calendar.colorClass);
                    } catch (error) {
                        failedCalendars.push(calendar.name);
                        return [];
                    }
                });

                try {
                    const allResults = await Promise.all(fetchPromises);
                    let allEvents = allResults.flat();

                    const now = new Date();
                    const startOfToday = new Date(
                        now.getFullYear(),
                        now.getMonth(),
                        now.getDate(),
                    );

                    // Sort all events globally
                    allEvents.sort((a, b) => a.start - b.start);

                    // Filter events that haven't ended yet today, or are in the future
                    const validEvents = allEvents.filter((e) => {
                        const end =
                            e.end || new Date(e.start.getTime() + 3600000); // fallback 1hr
                        return end > now || e.start > now;
                    });

                    renderEvents(validEvents, failedCalendars);
                } catch (error) {
                    console.error("Critical error:", error);
                }
            }

            function parseICS(icsString, colorClass) {
                const lines = icsString.split(/\r\n|\n|\r/);
                const events = [];
                let currentEvent = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    if (line.startsWith("BEGIN:VEVENT")) {
                        currentEvent = {};
                    } else if (line.startsWith("END:VEVENT")) {
                        if (currentEvent && currentEvent.start) {
                            currentEvent.colorClass = colorClass;
                            events.push(currentEvent);
                        }
                        currentEvent = null;
                    } else if (currentEvent) {
                        if (line.startsWith("SUMMARY:")) {
                            currentEvent.title = line.substring(8);
                        } else if (line.startsWith("DTSTART")) {
                            currentEvent.start = parseICSTime(
                                line.split(":")[1],
                            );
                        } else if (line.startsWith("DTEND")) {
                            currentEvent.end = parseICSTime(line.split(":")[1]);
                        }
                    }
                }
                return events;
            }

            function parseICSTime(dateStr) {
                if (!dateStr || dateStr.length < 15) return new Date();
                const y = dateStr.substring(0, 4);
                const m = dateStr.substring(4, 6) - 1;
                const d = dateStr.substring(6, 8);
                const h = dateStr.substring(9, 11);
                const min = dateStr.substring(11, 13);
                const s = dateStr.substring(13, 15);
                return new Date(Date.UTC(y, m, d, h, min, s));
            }

            function formatTime(date) {
                if (!date) return "";
                return date.toLocaleTimeString([], {
                    hour: "numeric",
                    minute: "2-digit",
                });
            }
            function isSameDay(d1, d2) {
                return (
                    d1.getFullYear() === d2.getFullYear() &&
                    d1.getMonth() === d2.getMonth() &&
                    d1.getDate() === d2.getDate()
                );
            }

            function getDayLabel(date) {
                const today = new Date();
                const tomorrow = new Date();
                tomorrow.setDate(today.getDate() + 1);

                if (isSameDay(date, today)) return "Today";
                if (isSameDay(date, tomorrow)) return "Tomorrow";

                // Returns format like "Mon, Apr 8"
                return date.toLocaleDateString([], {
                    weekday: "short",
                    month: "short",
                    day: "numeric",
                });
            }

            function renderEvents(events, failedCalendars) {
                const container = document.getElementById("calendar-container");
                container.innerHTML = "";

                const now = new Date();
                const hourHeight = 80; // Must match --hour-height in CSS
                const startHour = 8; // Start the grid at 8 AM
                const endHour = 23; // End at 11 PM

                // 1. Create the Time Grid (Background lines)
                const grid = document.createElement("div");
                grid.className = "time-grid";
                for (let i = startHour; i <= endHour; i++) {
                    const row = document.createElement("div");
                    row.className = "hour-row";
                    const label =
                        i === 12 ? "Noon" : i > 12 ? i - 12 + " PM" : i + " AM";
                    row.innerHTML = `<div class="hour-label">${label}</div>`;
                    grid.appendChild(row);
                }
                container.appendChild(grid);

                // 2. Create the Events Layer
                const eventsLayer = document.createElement("div");
                eventsLayer.className = "events-layer";
                grid.appendChild(eventsLayer);

                // 3. Render Today's Events
                const todayEvents = events.filter((e) =>
                    isSameDay(e.start, now),
                );

                todayEvents.forEach((event) => {
                    const startMins =
                        (event.start.getHours() - startHour) * 60 +
                        event.start.getMinutes();
                    const durationMins =
                        (event.end - event.start) / (1000 * 60);

                    const top = (startMins / 60) * hourHeight;
                    const height = (durationMins / 60) * hourHeight;

                    const extraClass = event.colorClass
                        ? ` ${event.colorClass}`
                        : "";

                    const eventHTML = `
                        <div class="cal-event-apple${extraClass}" style="top: ${top}px; height: ${height}px;">
                            <div class="apple-title">${event.title}</div>
                            ${durationMins > 30 ? `<div class="apple-subtitle">${formatTime(event.start)}</div>` : ""}
                        </div>
                    `;
                    eventsLayer.insertAdjacentHTML("beforeend", eventHTML);
                });

                // 4. Render "Now" Line
                if (now.getHours() >= startHour && now.getHours() <= endHour) {
                    const nowMins =
                        (now.getHours() - startHour) * 60 + now.getMinutes();
                    const nowTop = (nowMins / 60) * hourHeight;
                    eventsLayer.insertAdjacentHTML(
                        "beforeend",
                        `<div class="now-indicator-line" style="top: ${nowTop}px"></div>`,
                    );

                    // Auto-scroll to current time
                    setTimeout(() => {
                        container.scrollTo({
                            top: nowTop - 100,
                            behavior: "smooth",
                        });
                    }, 500);
                }
            }

            fetchAppleCalendars();

            // SPOTIFY INTEGRATION
            const CLIENT_ID = "778fe57066b24fb3b9c8ef6c48afe754";
            const REDIRECT_URI =
                "https://karolborecki.github.io/setup/dashboard/index.html";
            const SCOPES =
                "user-read-currently-playing user-read-playback-state user-modify-playback-state";

            let accessToken = null;

            function generateRandomString(length) {
                let text = "";
                const possible =
                    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
                for (let i = 0; i < length; i++) {
                    text += possible.charAt(
                        Math.floor(Math.random() * possible.length),
                    );
                }
                return text;
            }

            async function generateCodeChallenge(codeVerifier) {
                const encoder = new TextEncoder();
                const data = encoder.encode(codeVerifier);
                const digest = await window.crypto.subtle.digest(
                    "SHA-256",
                    data,
                );
                return btoa(String.fromCharCode(...new Uint8Array(digest)))
                    .replace(/\+/g, "-")
                    .replace(/\//g, "_")
                    .replace(/=+$/, "");
            }

            async function authenticateSpotify() {
                const codeVerifier = generateRandomString(128);
                const codeChallenge = await generateCodeChallenge(codeVerifier);

                window.localStorage.setItem("code_verifier", codeVerifier);

                const params = new URLSearchParams({
                    client_id: CLIENT_ID,
                    response_type: "code",
                    redirect_uri: REDIRECT_URI,
                    scope: SCOPES,
                    code_challenge_method: "S256",
                    code_challenge: codeChallenge,
                });

                window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
            }

            async function getAccessToken(code) {
                const codeVerifier = localStorage.getItem("code_verifier");

                const body = new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: "authorization_code",
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier,
                });

                try {
                    const response = await fetch(
                        "https://accounts.spotify.com/api/token",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/x-www-form-urlencoded",
                            },
                            body: body,
                        },
                    );

                    if (!response.ok) {
                        throw new Error("Nie udało się wymienić kodu na token");
                    }

                    const data = await response.json();
                    return data.access_token;
                } catch (error) {
                    console.error("Błąd podczas pobierania tokena:", error);
                    return null;
                }
            }

            async function initSpotify() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get("code");

                if (code) {
                    console.log(
                        "Znaleziono kod autoryzacji. Wymieniam na token...",
                    );
                    accessToken = await getAccessToken(code);

                    if (accessToken) {
                        window.history.replaceState(
                            {},
                            document.title,
                            window.location.pathname,
                        );

                        console.log("Pobrano token! Uruchamiam odpytywanie.");
                        fetchNowPlaying();
                        setInterval(fetchNowPlaying, 5000);
                    } else {
                        console.log("Błąd tokena, ponowne logowanie...");
                        authenticateSpotify();
                    }
                } else {
                    console.log(
                        "Brak kodu. Przekierowuję do Spotify automatycznie...",
                    );
                    authenticateSpotify();
                }
            }

            initSpotify();

            let isPlaying = false;

            async function fetchNowPlaying() {
                try {
                    const response = await fetch(
                        "https://api.spotify.com/v1/me/player/currently-playing",
                        {
                            headers: { Authorization: `Bearer ${accessToken}` },
                        },
                    );

                    if (response.status === 204 || response.status > 400) {
                        document.getElementById("track-name").textContent =
                            "Nothing playing right now";
                        document.getElementById("artist-name").textContent =
                            "-";
                        document.getElementById("album-art").style.display =
                            "none";
                        isPlaying = false;
                        document.getElementById("play-pause-btn").textContent =
                            "⏯";
                        return;
                    }

                    const data = await response.json();

                    isPlaying = data.is_playing;
                    document.getElementById("play-pause-btn").textContent =
                        isPlaying ? "⏸" : "⏯";

                    document.getElementById("track-name").textContent =
                        data.item.name;
                    document.getElementById("artist-name").textContent =
                        data.item.artists.map((a) => a.name).join(", ");

                    const albumArt = document.getElementById("album-art");
                    albumArt.src = data.item.album.images[0].url;
                    albumArt.style.display = "block";

                    fetchSpotifyQueue();
                } catch (error) {
                    console.error("Error fetching Spotify data:", error);
                }
            }

            async function controlSpotify(action) {
                let endpoint = "";
                let method = "POST";

                if (action === "next") endpoint = "next";
                if (action === "previous") endpoint = "previous";
                if (action === "play/pause") {
                    endpoint = isPlaying ? "pause" : "play";
                    method = "PUT";
                }

                try {
                    await fetch(
                        `https://api.spotify.com/v1/me/player/${endpoint}`,
                        {
                            method: method,
                            headers: { Authorization: `Bearer ${accessToken}` },
                        },
                    );

                    setTimeout(fetchNowPlaying, 500);
                } catch (error) {
                    console.error("Error controlling Spotify:", error);
                }
            }

            async function fetchSpotifyQueue() {
                try {
                    const response = await fetch(
                        "https://api.spotify.com/v1/me/player/queue",
                        {
                            headers: { Authorization: `Bearer ${accessToken}` },
                        },
                    );

                    if (!response.ok) return;
                    const data = await response.json();

                    const queueContainer =
                        document.getElementById("spotify-queue");
                    queueContainer.innerHTML = "";

                    if (!data.queue || data.queue.length === 0) {
                        queueContainer.innerHTML = `<div class="queue-item placeholder">Queue is empty</div>`;
                        return;
                    }

                    data.queue.slice(0, 4).forEach((track) => {
                        const artistName = track.artists
                            .map((a) => a.name)
                            .join(", ");

                        // Grab the smallest album image (index 2 is usually 64x64)
                        const thumbUrl =
                            track.album.images.length > 0
                                ? track.album.images[
                                      track.album.images.length - 1
                                  ].url
                                : "";

                        const trackHTML = `
                            <div class="queue-item">
                                <img src="${thumbUrl}" class="queue-thumb" alt="art">
                                <div class="queue-details">
                                    <div class="queue-track">${track.name}</div>
                                    <div class="queue-artist">${artistName}</div>
                                </div>
                            </div>
                        `;
                        queueContainer.insertAdjacentHTML(
                            "beforeend",
                            trackHTML,
                        );
                    });
                } catch (error) {
                    console.error("Error fetching queue:", error);
                }
            }

            //  Weather
            async function fetchWeather() {
                try {
                    const r = await fetch(
                        "https://api.open-meteo.com/v1/forecast?latitude=52.2298&longitude=21.0118&current_weather=true",
                    );
                    const d = await r.json();
                    const temp = Math.round(d.current_weather.temperature);
                    const code = d.current_weather.weathercode;

                    document.getElementById("temp").textContent = temp;
                    document.getElementById("condition").textContent =
                        decodeWeather(code);

                    let textColor, borderColor;

                    if (temp < 0) {
                        textColor = "#9c27b0";
                        borderColor = "rgba(156, 39, 176, 0.3)";
                    } else if (temp < 5) {
                        textColor = "#0288d1";
                        borderColor = "rgba(2, 136, 209, 0.3)";
                    } else if (temp < 15) {
                        textColor = "#6ec6ff";
                        borderColor = "rgba(110, 198, 255, 0.3)";
                    } else if (temp < 20) {
                        textColor = "#4caf78";
                        borderColor = "rgba(76, 175, 120, 0.3)";
                    } else if (temp < 25) {
                        textColor = "#e8a820";
                        borderColor = "rgba(232, 168, 32, 0.3)";
                    } else {
                        textColor = "#ff5252";
                        borderColor = "rgba(255, 82, 82, 0.3)";
                    }

                    const pill = document.querySelector(".weather-pill");
                    pill.style.color = textColor;
                    pill.style.borderColor = borderColor;
                } catch {
                    document.getElementById("condition").textContent =
                        "Unavailable";
                }
            }

            function decodeWeather(c) {
                if (c === 0) return "Clear Sky";
                if (c <= 3) return "Partly Cloudy";
                if (c <= 49) return "Fog";
                if (c <= 69) return "Rainy";
                if (c <= 79) return "Snowy";
                if (c <= 99) return "Stormy";
                return "Unknown";
            }
            fetchWeather();
            setInterval(fetchWeather, 600000);

            // ── Pomodoro ──────────────────────────────────────────────────
            const TOTAL = 25 * 60;
            let timeLeft = TOTAL,
                ticker = null,
                running = false;
            const ring = document.getElementById("ring");
            const r = 62;
            const circ = r * 2 * Math.PI;
            ring.style.strokeDasharray = `${circ} ${circ}`;
            ring.style.strokeDashoffset = 0;

            function setRing(pct) {
                ring.style.strokeDashoffset = circ - (pct / 100) * circ;
            }

            function updateDisplay() {
                const m = String(Math.floor(timeLeft / 60)).padStart(2, "0");
                const s = String(timeLeft % 60).padStart(2, "0");
                document.getElementById("pomodoro-time").textContent =
                    `${m}:${s}`;
                setRing((timeLeft / TOTAL) * 100);
            }

            function toggleTimer() {
                const btn = document.getElementById("timer-btn");
                if (running) {
                    clearInterval(ticker);
                    btn.textContent = "Resume";
                } else {
                    ticker = setInterval(() => {
                        if (timeLeft > 0) {
                            timeLeft--;
                            updateDisplay();
                        } else {
                            clearInterval(ticker);
                            alert("Focus session complete! Take a break.");
                            resetTimer();
                        }
                    }, 1000);
                    btn.textContent = "Pause";
                }
                running = !running;
            }

            function resetTimer() {
                clearInterval(ticker);
                timeLeft = TOTAL;
                running = false;
                document.getElementById("timer-btn").textContent =
                    "Start Focus";
                updateDisplay();
            }
            updateDisplay();

            //  Habits
            const HABITS = [
                "Mindfulness",
                "Workout",
                "Reading — 30 min",
                "Ice roller",
                "Green tea",
            ];

            function renderHabits() {
                const list = document.getElementById("habit-list");
                list.innerHTML = "";
                HABITS.forEach((h, i) => {
                    const saved = localStorage.getItem(`habit_${i}`) === "true";
                    const el = document.createElement("label");
                    el.className = "habit-item" + (saved ? " checked" : "");
                    el.innerHTML = `
              <input type="checkbox" ${saved ? "checked" : ""}/>
              <div class="habit-box"></div>
              <span>${h}</span>
            `;
                    el.querySelector("input").addEventListener(
                        "change",
                        (e) => {
                            localStorage.setItem(
                                `habit_${i}`,
                                e.target.checked,
                            );
                            el.classList.toggle("checked", e.target.checked);
                        },
                    );
                    list.appendChild(el);
                });
            }
            renderHabits();

            //  News helpers
            function renderNews(listId, items) {
                const ul = document.getElementById(listId);
                ul.innerHTML = "";
                items.forEach(({ url, title }) => {
                    const li = document.createElement("li");
                    li.className = "news-item";
                    li.innerHTML = `<a href="${url}" target="_blank" rel="noopener">${title}</a>`;
                    ul.appendChild(li);
                });
            }

            async function fetchWorldNews() {
                try {
                    const r = await fetch(
                        "https://www.reddit.com/r/worldnews/top.json?limit=7&t=day",
                    );
                    const d = await r.json();
                    renderNews(
                        "world-list",
                        d.data.children.map((p) => ({
                            url: "https://reddit.com" + p.data.permalink,
                            title: p.data.title,
                        })),
                    );
                } catch {
                    document.getElementById("world-list").innerHTML =
                        '<div class="placeholder" style="color:#c0504a">Failed to load.</div>';
                }
            }

            async function fetchHN() {
                try {
                    const ids = await (
                        await fetch(
                            "https://hacker-news.firebaseio.com/v0/topstories.json",
                        )
                    ).json();
                    const top = ids.slice(0, 7);
                    const stories = await Promise.all(
                        top.map((id) =>
                            fetch(
                                `https://hacker-news.firebaseio.com/v0/item/${id}.json`,
                            ).then((r) => r.json()),
                        ),
                    );
                    renderNews(
                        "hn-list",
                        stories.map((s) => ({
                            url:
                                s.url ||
                                `https://news.ycombinator.com/item?id=${s.id}`,
                            title: s.title,
                        })),
                    );
                } catch {
                    document.getElementById("hn-list").innerHTML =
                        '<div class="placeholder" style="color:#c0504a">Failed to load.</div>';
                }
            }

            async function fetchSpace() {
                try {
                    const d = await (
                        await fetch(
                            "https://api.spaceflightnewsapi.net/v4/articles/?limit=7",
                        )
                    ).json();
                    renderNews(
                        "space-list",
                        d.results.map((a) => ({ url: a.url, title: a.title })),
                    );
                } catch {
                    document.getElementById("space-list").innerHTML =
                        '<div class="placeholder" style="color:#c0504a">Failed to load.</div>';
                }
            }

            fetchWorldNews();
            fetchHN();
            fetchSpace();
        </script>
    </body>
</html>
